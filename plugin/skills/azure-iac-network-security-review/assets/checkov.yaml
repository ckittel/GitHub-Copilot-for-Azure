# Checkov configuration for iac-network-security-review
#
# Allow-list of CKV_AZURE_* / CKV2_AZURE_* rules whose descriptions are
# network-security relevant for Terraform or Bicep targets.
#
# Run standalone:  checkov -d <path> --config-file .checkov.yaml
# (Writes a CLI summary to stdout and `results_json.json` to
# `.network-security-review-validators/`.)
#
# When invoked from the iac-network-security-review skill, the skill
# overrides --output-file-path with a per-run timestamped directory

framework:
  - bicep
  - terraform
  - terraform_plan

soft-fail: false
compact: true
quiet: true
output:
  - cli
  - json
output-file-path: .network-security-review-validators

check:
  # ---------- NSG / port restrictions ----------
  - CKV_AZURE_9     # NSG: RDP restricted from the internet
  - CKV_AZURE_10    # NSG: SSH restricted from the internet
  - CKV_AZURE_77    # NSG: UDP services restricted from the internet
  - CKV_AZURE_160   # NSG: HTTP (port 80) restricted from the internet
  - CKV2_AZURE_31   # VNET subnet has an NSG attached

  # ---------- NSG flow logs ----------
  - CKV_AZURE_12    # NSG flow log retention >= 90 days

  # ---------- Storage Account network exposure / transport ----------
  - CKV_AZURE_3     # Storage supportsHttpsTrafficOnly = true
  - CKV_AZURE_34    # Blob container "Public access level" = Private
  - CKV_AZURE_35    # Storage default network access = Deny
  - CKV_AZURE_36    # Storage "Trusted Microsoft Services" bypass configured
  - CKV_AZURE_44    # Storage Account latest TLS version
  - CKV_AZURE_59    # Storage Accounts disallow public access
  - CKV_AZURE_190   # Storage blobs restrict public access
  - CKV2_AZURE_8    # Activity-log storage container not publicly accessible
  - CKV2_AZURE_33   # Storage Account configured with private endpoint
  - CKV2_AZURE_47   # Storage Account: no blob anonymous access

  # ---------- SQL / DB network exposure, firewalls, private endpoints, transport ----------
  - CKV_AZURE_11    # SQL Databases: no ingress from 0.0.0.0/0
  - CKV_AZURE_28    # MySQL: Enforce SSL connection
  - CKV_AZURE_29    # PostgreSQL: Enforce SSL connection
  - CKV_AZURE_47    # MariaDB: Enforce SSL connection
  - CKV_AZURE_48    # MariaDB: public network access disabled
  - CKV_AZURE_52    # MSSQL latest TLS version
  - CKV_AZURE_53    # MySQL: public network access disabled
  - CKV_AZURE_54    # MySQL latest TLS version
  - CKV_AZURE_68    # PostgreSQL: public network access disabled
  - CKV_AZURE_113   # MSSQL: public network access disabled
  - CKV_AZURE_147   # PostgreSQL latest TLS version
  - CKV2_AZURE_6    # PostgreSQL: "Allow access to Azure services" disabled
  - CKV2_AZURE_19   # Synapse: no IP firewall rules attached
  - CKV2_AZURE_26   # PostgreSQL Flexible: no overly permissive network access
  - CKV2_AZURE_34   # SQL server firewall not overly permissive
  - CKV2_AZURE_37   # MariaDB latest TLS (1.2)
  - CKV2_AZURE_42   # PostgreSQL configured with private endpoint
  - CKV2_AZURE_43   # MariaDB configured with private endpoint
  - CKV2_AZURE_44   # MySQL configured with private endpoint
  - CKV2_AZURE_45   # MSSQL configured with private endpoint
  - CKV2_AZURE_56   # MySQL Flexible configured with private endpoint
  - CKV2_AZURE_57   # PostgreSQL Flexible configured with private endpoint

  # ---------- Cosmos DB ----------
  - CKV_AZURE_99    # Cosmos DB has restricted access (firewall / VNET)
  - CKV_AZURE_101   # Cosmos DB: public network access disabled

  # ---------- Key Vault network exposure ----------
  - CKV_AZURE_109   # Key Vault firewall rules configured
  - CKV_AZURE_189   # Key Vault: public network access disabled
  - CKV2_AZURE_32   # Key Vault configured with private endpoint

  # ---------- AKS network controls ----------
  - CKV_AZURE_6     # AKS: API Server Authorized IP Ranges
  - CKV_AZURE_7     # AKS: Network Policy configured
  - CKV_AZURE_8     # AKS: Kubernetes Dashboard disabled (exposed admin UI)
  - CKV_AZURE_115   # AKS: private cluster
  - CKV_AZURE_143   # AKS: nodes do not have public IPs
  - CKV_AZURE_246   # AKS: HTTP application routing disabled (auto-public DNS zone)
  - CKV2_AZURE_29   # AKS: Azure CNI networking enabled

  # ---------- App Service / Function App / Web App ----------
  - CKV_AZURE_14    # Web app: redirect HTTP -> HTTPS
  - CKV_AZURE_15    # Web app latest TLS version
  - CKV_AZURE_17    # Web app: client certificates required (mTLS)
  - CKV_AZURE_62    # Function app: restrict accessible regions
  - CKV_AZURE_70    # Function apps accessible only over HTTPS
  - CKV_AZURE_72    # App services: remote debugging disabled
  - CKV_AZURE_78    # App service: FTP deployments disabled
  - CKV_AZURE_145   # Function app latest TLS version
  - CKV_AZURE_153   # App Service slot: HTTP -> HTTPS redirect
  - CKV_AZURE_154   # App Service slot latest TLS version
  - CKV_AZURE_155   # App Service slot: debugging disabled
  - CKV_AZURE_221   # Function App: public network access disabled
  - CKV_AZURE_222   # Web App: public network access disabled

  # ---------- Azure Container Registry ----------
  - CKV_AZURE_138   # ACR: anonymous pulling disabled
  - CKV_AZURE_139   # ACR: public networking disabled
  - CKV_AZURE_237   # ACR: dedicated data endpoints enabled
  - CKV2_AZURE_30   # ACR webhook uses HTTPS

  # ---------- AI / ML / Cognitive Services / Search ----------
  - CKV_AZURE_124   # Cognitive Search: public network access disabled
  - CKV_AZURE_134   # Cognitive Services: public network access disabled
  - CKV_AZURE_144   # ML Workspace: public access disabled
  - CKV_AZURE_210   # Cognitive Search: allowed IPs do not give public access
  - CKV_AZURE_243   # ML Workspace configured with private endpoint
  - CKV2_AZURE_49   # ML Workspace: no overly permissive network access
  - CKV2_AZURE_50   # ML-associated Storage Account not publicly accessible

  # ---------- Redis ----------
  - CKV_AZURE_89    # Redis: public network access disabled
  - CKV_AZURE_91    # Redis: only SSL connections enabled
  - CKV_AZURE_148   # Redis latest TLS version

  # ---------- Messaging: Service Bus / Event Hub / Event Grid ----------
  - CKV_AZURE_106   # Event Grid Domain: public network access disabled
  - CKV_AZURE_193   # Event Grid Topic: public network access disabled
  - CKV_AZURE_204   # Service Bus: public network access disabled
  - CKV_AZURE_205   # Service Bus latest TLS version
  - CKV_AZURE_223   # Event Hub Namespace TLS 1.2 minimum

  # ---------- APIM / App Gateway / Front Door / WAF ----------
  - CKV_AZURE_107   # APIM uses virtual networks
  - CKV_AZURE_120   # Application Gateway: WAF enabled
  - CKV_AZURE_121   # Front Door: WAF enabled
  - CKV_AZURE_122   # Application Gateway WAF in Detection or Prevention mode
  - CKV_AZURE_123   # Front Door WAF in Detection or Prevention mode
  - CKV_AZURE_133   # Front Door WAF prevents log4shell (CVE-2021-44228)
  - CKV_AZURE_135   # App Gateway WAF prevents log4shell (CVE-2021-44228)
  - CKV_AZURE_152   # APIM: client certificates enforced
  - CKV_AZURE_173   # APIM: TLS 1.2 minimum
  - CKV_AZURE_174   # APIM: public access disabled
  - CKV_AZURE_215   # APIM backend uses HTTPS
  - CKV_AZURE_217   # App Gateway listener: no HTTP-only connections
  - CKV_AZURE_218   # App Gateway: secure protocols for in-transit communication

  # ---------- Azure Firewall ----------
  - CKV_AZURE_216   # Azure Firewall: DenyIntelMode = Deny
  - CKV_AZURE_219   # Firewall has a firewall policy attached
  - CKV_AZURE_220   # Firewall policy: IDPS mode = Deny

  # ---------- CDN ----------
  - CKV_AZURE_197   # CDN: HTTP endpoint disabled
  - CKV_AZURE_198   # CDN: HTTPS endpoint enabled
  - CKV_AZURE_200   # CDN custom-domain endpoint latest TLS

  # ---------- VNET / DNS / Network Interfaces ----------
  - CKV_AZURE_118   # NIC: IP forwarding disabled
  - CKV_AZURE_119   # NIC: does not use public IPs
  - CKV_AZURE_182   # VNET: at least 2 connected DNS endpoints
  - CKV_AZURE_183   # VNET uses local DNS addresses

  # ---------- Analytics / Data services ----------
  - CKV_AZURE_58    # Synapse: managed virtual networks enabled
  - CKV_AZURE_104   # Azure Data Factory: public network access disabled
  - CKV_AZURE_157   # Synapse: data exfiltration protection enabled
  - CKV_AZURE_158   # Databricks: data-plane to control-plane via private link

  # ---------- Container Instances ----------
  - CKV_AZURE_98    # Container group deployed into VNET
  - CKV_AZURE_245   # Container group deployed into VNET (newer variant)

  # ---------- Compute / VM network exposure ----------
  - CKV_AZURE_251   # Managed Disk: no public network access
  - CKV2_AZURE_39   # VM: not configured with public IP + serial console

  # ---------- App Configuration ----------
  - CKV_AZURE_185   # App Configuration: public access disabled

  # ---------- Other PaaS network exposure ----------
  - CKV_AZURE_64    # Azure File Sync: public network access disabled
  - CKV_AZURE_108   # IoT Hub: public network access disabled
  - CKV_AZURE_248   # Batch: account access = deny when public network enabled
  - CKV2_AZURE_24   # Automation Account: no overly permissive network access
